<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro – RespireSP</title>
 
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Montserrat:wght@400;500&family=Patua+One&display=swap">
  <link rel="stylesheet" href="../css/pages/cadastro.css">
</head>
<body>
 
  <div class="page">
    <div class="card">
 
      <!-- Coluna esquerda: formulário -->
      <div class="col-form">
        <p class="logo">Respire sp</p>
        <h1 class="titulo">Cadastre sua conta</h1>
        <p class="subtitulo">Crie sua conta no RespireSP - E comece sua jornada</p>
 
        <div class="row-names">
          <div class="input-group">
            <img src="../assets/imgs/Users.png" alt="" class="icon">
            <input type="text" placeholder="Insira seu nome">
          </div>
          <div class="input-group">
            <img src="../assets/imgs/Users.png" alt="" class="icon">
            <input type="text" placeholder="Insira seu sobrenome">
          </div>
        </div>
 
        <div class="input-group">
          <input type="email" placeholder="Insira seu e-mail">
          <img src="../assets/imgs/email.png" alt="" class="icon">
        </div>
 
        <div class="input-group">
          <input type="password" placeholder="Insira sua senha">
          <img src="../assets/imgs/Olho.png" alt="" class="icon">
        </div>
 
        <div class="input-group">
          <input type="password" placeholder="Confirme sua senha">
          <img src="../assets/imgs/Olho.png" alt="" class="icon">
        </div>
 
        <button class="btn-cadastrar">Cadastrar</button>
 
        <p class="link-login">
          Já tem conta? <a href="/pages/login.html">Faça login</a>
        </p>
      </div>
 
      <!-- Coluna direita: imagem -->
      <div class="col-img">
        <img src="../assets/imgs/imgCadastro.png" alt="Imagem de cadastro">
      </div>
 
    </div>
  </div>
 
</body>
</html>
