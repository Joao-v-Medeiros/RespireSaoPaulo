<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="initial-scale=1, width=device-width" />
        <script src="/js/services/login.js"></script>
        <link rel="stylesheet" href="../css/pages/login.css" />
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Patua+One&family=Montserrat:wght@400;500&display=swap" />
        <title>RespireSP - Login</title>
    </head>
    <body>
        <div class="desktop-2">
            <div class="form-side">
                <div class="respire-sp">Respire sp</div>
                <div class="seja-bem-vindoa">Seja bem-vindo(a)</div>
                <div class="seja-bem-vindoa-de">Seja bem-vindo(a) de volta!</div>

                <div class="insira-seu-e-mail-parent">
                    <input type="email" id="emailInput" placeholder="Insira seu e-mail" />
                    <img src="../assets/imgs/Users.png" class="weuieyes-off-filled-icon" alt="user" />
                </div>

                <div class="insira-sua-senha-parent">
                    <input type="password" id="senhaInput" placeholder="Insira sua senha" />
                    <img id="olhoIcon" src="../assets/imgs/Olho.png" class="weuieyes-off-filled-icon" onclick="toggleSenha()" />
                </div>

                <div class="esqueceu-sua-senha">Esqueceu sua senha?</div>

                <div class="entrar-wrapper" id="btnEntrar">
                    <span class="entrar">Entrar</span>
                </div>

                <div class="no-tem-conta-container">
                    <span>Não tem conta? </span>
                    <a href="cadastro.html"><span class="faa-seu-cadastro">Faça seu cadastro</span></a>
                </div>
            </div>

            <img class="desktop-2-inner" src="../assets/imgs/imgLogin.png" alt="cidade" />
        </div>

        <script src="js/auth.js"></script>
        <script>
            // 1. Alternar visibilidade da senha
            function toggleSenha() {
                const campo = document.getElementById("senhaInput");
                const olho = document.getElementById("olhoIcon");
                campo.type = campo.type === "password" ? "text" : "password";
            }

            // 2. Lógica de clique no botão Entrar
            document.getElementById('btnEntrar').addEventListener('click', () => {
                const email = document.getElementById('emailInput').value;
                const senha = document.getElementById('senhaInput').value;

                if (!email || !senha) {
                    alert("Por favor, preencha todos os campos.");
                    return;
                }

                if (AuthService.login(email, senha)) {
                    window.location.href = 'home.html'; // Redireciona para sua Home
                } else {
                    alert("Usuário ou senha inválidos!");
                }
            });
        </script>
    </body>
</html>
